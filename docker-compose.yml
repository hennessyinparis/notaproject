services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nota_user
      POSTGRES_PASSWORD: nota_pass
      POSTGRES_DB: nota_db
      POSTGRES_HOST_AUTH_METHOD: trust
      LANG: en_US.utf8
      LC_ALL: en_US.utf8
    command: postgres -c listen_addresses='*' -c client_encoding='utf8'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nota_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrate
    working_dir: /app/backend
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg2://nota_user:nota_pass@db:5432/nota_db
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nota_user:nota_pass@db:5432/nota_db
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: supersecretkey123changeme
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      MEDIA_DIR: media
      BASE_URL: http://localhost:8000
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      CSP_ENABLED: "true"
      RATE_LIMIT_ENABLED: "true"
      MAX_TRACK_SIZE_MB: 200
      MAX_COVER_SIZE_MB: 10
      SMTP_FROM: noreply@nota.app
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
